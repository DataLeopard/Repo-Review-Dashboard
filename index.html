<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataLeopard Repo Review</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Tab Bar -->
    <div id="tab-bar">
        <div id="tabs"></div>
        <div id="progress">
            <button id="open-all-live" title="Open all live sites in new tabs">Open All Live</button>
            <span id="progress-text">Loading...</span>
        </div>
    </div>

    <!-- Main -->
    <div id="main">
        <!-- Sidebar -->
        <div id="sidebar">
            <div id="objectives">
                <h3>Quick Review</h3>
                <div id="repo-summary"></div>
            </div>
            <div id="changes">
                <h3>What Changed</h3>
                <div id="change-list"></div>
            </div>
            <div id="file-nav">
                <h3>Files</h3>
                <div id="file-list"></div>
            </div>
            <div id="feedback">
                <h3>Verdict</h3>
                <div id="verdict-btns">
                    <button class="sbtn good" data-status="good">Good</button>
                    <button class="sbtn needs-work" data-status="needs-work">Needs Work</button>
                    <button class="sbtn skip" data-status="skip">Skip</button>
                </div>
                <textarea id="quick-note" placeholder="Quick note (auto-saves)..."></textarea>
            </div>
        </div>

        <!-- Content -->
        <div id="content">
            <div id="content-toolbar">
                <span id="view-label">Loading repos...</span>
                <div id="toolbar-right">
                    <button id="btn-open-live" class="hidden">Open Live Site</button>
                    <button id="btn-github">GitHub</button>
                </div>
            </div>
            <!-- Live site launch panel (shown for repos with deployed sites) -->
            <div id="live-panel" class="hidden">
                <div id="live-inner">
                    <div id="live-url-display"></div>
                    <button id="live-launch-btn">Open Live Site in New Tab</button>
                    <p id="live-hint">GitHub Pages blocks iframe embedding.<br>Click above to view the rendered app, or browse files below.</p>
                </div>
            </div>
            <!-- Code viewer -->
            <div id="code-area" class="hidden">
                <pre><code id="code-content"></code></pre>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
